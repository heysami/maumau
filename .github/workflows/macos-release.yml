name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build (for example v2026.3.24 or v2026.3.24-beta.1)
        required: true
        type: string

concurrency:
  group: macos-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.x"
  PNPM_VERSION: "10.23.0"

jobs:
  build_and_publish_macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]{4}\.[1-9][0-9]*\.[1-9][0-9]*((-beta\.[1-9][0-9]*)|(-[1-9][0-9]*))?$ ]]; then
            echo "Invalid release tag format: ${TAG}"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=Maumau macOS test build ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
          fetch-depth: 0

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "false"
          use-sticky-disk: "false"

      - name: Select Xcode with Swift 6.2 or newer
        shell: bash
        run: |
          set -euo pipefail
          found=""

          while IFS= read -r app; do
            sudo xcode-select -s "$app/Contents/Developer"
            version="$(swift --version | head -n 1)"
            echo "Checked $app -> $version"
            if swift --version | grep -Eq 'Apple Swift version 6\.[2-9]'; then
              found="$app"
              break
            fi
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -Vr)

          if [[ -z "$found" ]]; then
            echo "No Xcode with Swift 6.2 or newer found on runner."
            exit 1
          fi

          echo "Using $found"
          xcodebuild -version
          swift --version

      - name: Validate release tag and package metadata
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_MAIN_REF: origin/main
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_SHA=$(git rev-parse HEAD)
          export RELEASE_SHA RELEASE_TAG RELEASE_MAIN_REF
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          pnpm release:maumau:npm:check

      - name: Build ad-hoc macOS release artifacts
        env:
          ALLOW_ADHOC_SIGNING: "1"
          CODESIGN_TIMESTAMP: "off"
          SKIP_DMG_STYLE: "1"
          SKIP_NOTARIZE: "1"
          SKIP_PNPM_INSTALL: "1"
        shell: bash
        run: bash scripts/package-mac-dist.sh

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          files=()
          for pattern in Maumau-*.zip Maumau-*.dmg Maumau-*.dSYM.zip; do
            for file in $pattern; do
              if [[ -e "$file" ]]; then
                files+=("$file")
              fi
            done
          done

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No macOS release files were produced."
            exit 1
          fi

          shasum -a 256 "${files[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          Maumau macOS test build.

          This build is ad-hoc signed for testing only. It is not notarized, so macOS may block it on first launch.

          Test install:
          1. Drag `Maumau.app` into `/Applications`.
          2. Clear the quarantine flag:
             `xattr -dr com.apple.quarantine "/Applications/Maumau.app"`
          3. Launch it once with Finder or:
             `open "/Applications/Maumau.app"`

          Included assets:
          - `.zip` for direct download / Sparkle-style packaging tests
          - `.dmg` for drag-to-Applications install tests
          - `.dSYM.zip` for symbolicated crash debugging when available
          - `SHA256SUMS.txt` for checksum verification
          EOF

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ steps.release.outputs.tag }}
          path: |
            dist/Maumau-*.zip
            dist/Maumau-*.dmg
            dist/Maumau-*.dSYM.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.release_name }}
          body_path: release-notes.md
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            dist/Maumau-*.zip
            dist/Maumau-*.dmg
            dist/Maumau-*.dSYM.zip
            dist/SHA256SUMS.txt

      - name: Summarize release output
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          {
            echo "## macOS test release published"
            echo
            echo "- Release: https://github.com/${REPOSITORY}/releases/tag/${RELEASE_TAG}"
            echo "- Quarantine bypass for testers: \`xattr -dr com.apple.quarantine \"/Applications/Maumau.app\"\`"
          } >> "$GITHUB_STEP_SUMMARY"
